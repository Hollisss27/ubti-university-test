<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>大学气质人物形象总览</title>
    <style>

      :root {
        --bg: #f7fbf6;
        --card: #fffefc;
        --line: #d9e9dc;
        --line-strong: #cfe3d3;
        --text: #243029;
        --muted: #6f7f74;
        --green: #4f6f58;
        --accent: #2f8f42;
        --blue: #4f8df7;
        --shadow: 0 24px 70px rgba(75, 105, 82, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          "PingFang SC",
          "Hiragino Sans GB",
          "Microsoft YaHei",
          Arial,
          sans-serif;
        background:
          radial-gradient(circle at 12% 12%, rgba(83, 126, 91, 0.07), transparent 28%),
          radial-gradient(circle at 88% 28%, rgba(83, 126, 91, 0.05), transparent 30%),
          var(--bg);
      }

      button {
        font: inherit;
      }

      .hidden {
        display: none !important;
      }

      .shell {
        width: min(720px, calc(100vw - 36px));
        margin: 24px auto 0;
        min-height: calc(100vh - 24px);
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid var(--line-strong);
        border-radius: 18px 18px 0 0;
        box-shadow: 0 18px 48px rgba(75, 105, 82, 0.1);
        padding: 22px 20px 36px;
      }

      body.result-mode .shell {
        width: min(1040px, calc(100vw - 72px));
        padding: 26px;
      }

      .intro {
        display: flex;
        min-height: 520px;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px 0;
      }

      .intro h1 {
        margin: 0;
        max-width: 520px;
        font-size: 38px;
        line-height: 1.18;
        letter-spacing: 0;
      }

      .primary {
        margin-top: 30px;
        height: 44px;
        padding: 0 22px;
        border: 0;
        border-radius: 12px;
        background: #4f6f58;
        color: #fff;
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
      }

      .disclaimer {
        margin-top: 18px;
        color: #8a968d;
        font-size: 14px;
      }

      .credits {
        margin-top: 34px;
        text-align: left;
        color: var(--text);
        font-size: 15px;
        line-height: 1.65;
        font-weight: 650;
      }

      .credits a {
        color: #06e;
        text-decoration: underline;
      }

      .vibe-card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: #fff;
      }

      .image-zone {
        position: relative;
        height: 330px;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 86% 90%, rgba(79, 111, 88, 0.08), transparent 28%),
          #fff;
      }

      .poster-title {
        position: absolute;
        top: 18px;
        left: 0;
        right: 0;
        padding: 0 104px;
        z-index: 3;
        text-align: center;
        color: rgba(35, 35, 35, 0.72);
        font-size: 24px;
        line-height: 1.1;
        font-weight: 850;
      }

      .poster-cn {
        position: absolute;
        top: 58px;
        left: 0;
        right: 0;
        z-index: 3;
        text-align: center;
        color: rgba(34, 34, 34, 0.82);
        font-size: 44px;
        line-height: 1;
        font-weight: 900;
        letter-spacing: 0;
      }

      .poster-code {
        position: absolute;
        top: 100px;
        left: 0;
        right: 0;
        z-index: 3;
        text-align: center;
        color: var(--accent);
        font-size: 46px;
        line-height: 1;
        font-weight: 900;
        letter-spacing: 0;
      }

      .rarity {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 4;
        min-width: 78px;
        height: 34px;
        padding: 0 12px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: var(--blue);
        color: #fff;
        font-size: 18px;
        font-weight: 850;
      }

      .caption {
        min-height: 120px;
        padding: 24px 22px;
        border-top: 1px solid #eef2f7;
      }

      .caption-title {
        margin: 0 0 10px;
        font-size: 26px;
        line-height: 1.1;
        font-weight: 900;
      }

      .caption-title span {
        margin-left: 10px;
        color: var(--muted);
        font-size: 22px;
        font-weight: 800;
      }

      .caption-desc {
        margin: 0;
        color: #667a95;
        font-size: 21px;
        line-height: 1.25;
        font-weight: 750;
      }

      .poly-person {
        position: absolute;
        left: 50%;
        bottom: -16px;
        width: 206px;
        height: 206px;
        transform: translateX(-50%);
      }

      .avatar-image {
        position: absolute;
        left: 50%;
        bottom: 18px;
        z-index: 1;
        width: min(86%, 250px);
        height: 174px;
        object-fit: contain;
        transform: translateX(-50%);
      }

      .progress-row {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 14px;
        margin-bottom: 18px;
      }

      .progress-track {
        height: 10px;
        border-radius: 999px;
        background: #eaf2ed;
        overflow: hidden;
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: #9fbba7;
        transition: width 0.2s ease;
      }

      .progress-count {
        color: var(--muted);
        font-size: 14px;
        font-weight: 800;
      }

      .question-card {
        border: 1px solid var(--line-strong);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.72);
        padding: 18px;
        margin-bottom: 16px;
      }

      .question-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 66px;
        height: 30px;
        padding: 0 12px;
        border-radius: 999px;
        background: #edf6ef;
        border: 1px solid var(--line-strong);
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .hidden-dims {
        color: var(--muted);
        font-size: 12px;
        font-weight: 750;
      }

      .question-title {
        margin: 0 0 16px;
        font-size: 18px;
        line-height: 1.35;
        font-weight: 850;
      }

      .options {
        display: grid;
        gap: 10px;
      }

      .option {
        display: grid;
        grid-template-columns: 18px 24px 1fr;
        align-items: center;
        gap: 10px;
        min-height: 48px;
        padding: 0 14px;
        border: 1px solid var(--line-strong);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.78);
        cursor: pointer;
      }

      .option:hover {
        border-color: #adcbb4;
        background: #fbfffb;
      }

      .option.selected {
        border-color: #8fb99a;
        background: #f2faf4;
      }

      .option.selected .radio {
        border-color: #4f6f58;
        box-shadow: inset 0 0 0 5px #fff;
        background: #4f6f58;
      }

      .submit-row {
        display: flex;
        justify-content: center;
        padding: 12px 0 4px;
      }

      .radio {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 1.5px solid #7d877f;
        background: #fff;
      }

      .letter {
        color: var(--green);
        font-size: 17px;
        font-weight: 900;
      }

      .option-text {
        font-size: 16px;
        line-height: 1.35;
        font-weight: 800;
      }

      .result-layout {
        display: block;
      }

      .result-hero {
        display: grid;
        grid-template-columns: minmax(320px, 0.82fr) 1fr;
        gap: 22px;
        margin-bottom: 20px;
      }

      .result-panel,
      .result-section {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.84);
        padding: 22px;
      }

      .result-panel h2 {
        margin: 8px 0 16px;
        font-size: 52px;
        line-height: 1;
      }

      .result-label {
        color: var(--muted);
        font-size: 15px;
        font-weight: 800;
      }

      .result-badge {
        display: inline-flex;
        align-items: center;
        margin: 4px 0 18px;
        min-height: 40px;
        padding: 0 18px;
        border-radius: 999px;
        background: #edf6ef;
        border: 1px solid var(--line-strong);
        color: var(--green);
        font-size: 18px;
        font-weight: 900;
      }

      .result-lead {
        margin: 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.7;
        font-weight: 760;
      }

      .result-section {
        margin-top: 20px;
      }

      .result-section h3 {
        margin: 0 0 18px;
        font-size: 23px;
        line-height: 1.2;
      }

      .result-copy {
        margin: 0;
        color: var(--text);
        font-size: 17px;
        line-height: 1.9;
        font-weight: 680;
      }

      .dimension-list {
        display: grid;
        gap: 14px;
      }

      .dimension-item {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: start;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px 18px;
        background: #fff;
      }

      .dimension-title {
        margin: 0 0 8px;
        font-size: 18px;
        font-weight: 900;
      }

      .dimension-desc {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.5;
        font-weight: 680;
      }

      .dimension-score {
        color: var(--green);
        font-size: 18px;
        font-weight: 950;
        white-space: nowrap;
      }

      .result-list {
        display: grid;
        gap: 12px;
        margin: 0;
      }

      .result-item {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 13px 16px;
        background: #fff;
      }

      .result-item b {
        display: block;
        margin-bottom: 6px;
      }

      .result-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 20px;
      }

      .secondary {
        height: 46px;
        padding: 0 18px;
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        background: #fff;
        color: var(--text);
        font-weight: 800;
        cursor: pointer;
      }

      @media (max-width: 900px) {
        .shell {
          width: calc(100vw - 24px);
          margin-top: 12px;
          min-height: calc(100vh - 12px);
          padding: 16px 12px 28px;
          border-radius: 16px;
        }

        body.result-mode .shell {
          width: calc(100vw - 24px);
          padding: 14px 10px 28px;
        }

        .intro {
          grid-template-columns: 1fr;
        }

        .result-hero {
          grid-template-columns: 1fr;
          gap: 14px;
        }

        .intro {
          min-height: 480px;
          padding: 36px 0 28px;
        }

        .intro h1 {
          max-width: 300px;
          font-size: 28px;
          line-height: 1.18;
        }

        .primary {
          margin-top: 24px;
          height: 40px;
          padding: 0 18px;
          border-radius: 10px;
          font-size: 15px;
        }

        .credits {
          margin-top: 28px;
          font-size: 13px;
          line-height: 1.7;
        }

        .question-title {
          margin-bottom: 14px;
          font-size: 16px;
          font-weight: 820;
        }

        .question-card {
          padding: 14px;
          margin-bottom: 12px;
          border-radius: 14px;
        }

        .question-head {
          margin-bottom: 12px;
        }

        .pill {
          min-width: 58px;
          height: 26px;
          padding: 0 10px;
          font-size: 12px;
        }

        .hidden-dims {
          font-size: 11px;
        }

        .option {
          grid-template-columns: 16px 21px 1fr;
          min-height: 42px;
          gap: 8px;
          padding: 0 10px;
          border-radius: 11px;
        }

        .radio {
          width: 14px;
          height: 14px;
        }

        .letter {
          font-size: 15px;
        }

        .option-text {
          font-size: 14px;
          font-weight: 760;
        }

        .image-zone {
          height: 320px;
        }

        .poster-title {
          font-size: 24px;
          top: 16px;
          padding: 0 88px;
        }

        .poster-cn {
          font-size: 42px;
          top: 56px;
        }

        .poster-code {
          font-size: 40px;
          top: 98px;
        }

        .poly-person {
          width: 196px;
          height: 196px;
        }

        .avatar-image {
          width: min(86%, 238px);
          height: 168px;
        }

        .result-panel h2 {
          font-size: 32px;
          line-height: 1.18;
        }

        .result-panel,
        .result-section {
          padding: 18px 16px;
          border-radius: 16px;
        }

        .result-section h3 {
          font-size: 20px;
        }

        .result-copy,
        .result-lead {
          font-size: 15px;
        }

        .dimension-item {
          grid-template-columns: 1fr;
          gap: 8px;
          padding: 14px;
        }

        .dimension-score {
          font-size: 16px;
        }
      }
    
      body { background: #f6f9f7; padding-bottom: 48px; }
      .gallery-shell { width: min(1120px, calc(100vw - 40px)); margin: 24px auto; }
      .gallery-head { display: grid; grid-template-columns: 1fr auto; align-items: start; gap: 18px; margin-bottom: 22px; }
      .gallery-head h1 { margin: 0; font-size: 30px; line-height: 1.15; letter-spacing: 0; }
      .gallery-head p { margin: 8px 0 0; color: var(--muted); font-weight: 750; }
      .gallery-note { margin: 18px 0 12px; color: #56677b; font-size: 15px; line-height: 1.55; text-align: center; font-weight: 750; }
      .gallery-section-title { margin: 18px 0 12px; color: #60738c; font-size: 15px; font-weight: 900; }
      .gallery-section-title::before { content: ""; display: inline-block; width: 4px; height: 18px; margin-right: 9px; border-radius: 999px; background: #21c58b; vertical-align: -4px; }
      .gallery-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
      .gallery-card { overflow: hidden; border: 1px solid #d9e5ef; border-radius: 14px; background: #fff; box-shadow: 0 10px 26px rgba(45, 70, 96, .04); cursor: pointer; transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease; }
      .gallery-card:hover { transform: translateY(-2px); border-color: #bdd5e7; box-shadow: 0 16px 34px rgba(45, 70, 96, .09); }
      .gallery-card:focus-visible { outline: 3px solid rgba(47, 143, 66, .28); outline-offset: 3px; }
      .gallery-visual { position: relative; height: 312px; overflow: hidden; background: linear-gradient(#fff, #fff 78%, #f7fafb); }
      .gallery-rarity { position: absolute; top: 10px; right: 10px; z-index: 5; min-width: 56px; height: 23px; padding: 0 9px; display: grid; place-items: center; border-radius: 999px; color: #fff; font-size: 12px; line-height: 1; font-weight: 950; box-shadow: 0 5px 12px rgba(29, 54, 78, .14); white-space: nowrap; }
      .rare-common { background: #2b8fd8; }
      .rare-uncommon { background: #64748b; }
      .rare-rare { background: #8b5cf6; }
      .rare-ultra { background: #f0526b; }
      .gallery-type { position: absolute; top: 12px; left: 8px; right: 8px; z-index: 2; text-align: center; color: rgba(45,45,45,.58); font-size: 18px; line-height: 1.1; font-weight: 850; }
      .gallery-cn { position: absolute; top: 46px; left: 8px; right: 8px; z-index: 2; text-align: center; color: #4b4f4d; font-size: 31px; line-height: 1; font-weight: 950; letter-spacing: 0; }
      .gallery-code { position: absolute; top: 82px; left: 8px; right: 8px; z-index: 2; text-align: center; color: var(--accent); font-size: 28px; line-height: 1; font-weight: 950; letter-spacing: 0; }
      .gallery-avatar { position: absolute; left: 50%; top: 126px; z-index: 1; width: 96%; height: 176px; object-fit: contain; transform: translateX(-50%); }
      .gallery-caption { min-height: 70px; padding: 11px 14px 10px; border-top: 1px solid #eef2f7; background: #fbfdff; }
      .gallery-caption h2 { margin: 0 0 6px; color: #111827; font-size: 16px; line-height: 1.18; font-weight: 950; }
      .gallery-caption h2 span { display: inline-block; margin-left: 3px; color: #62766e; font-size: 14px; font-weight: 850; }
      .gallery-caption p { margin: 0; color: #64748b; font-size: 13px; line-height: 1.35; font-weight: 700; }
      .detail-overlay { position: fixed; inset: 0; z-index: 50; display: none; align-items: center; justify-content: center; padding: 24px; background: rgba(28, 40, 32, .36); backdrop-filter: blur(6px); }
      .detail-overlay.open { display: flex; }
      .detail-panel { position: relative; width: min(980px, calc(100vw - 32px)); max-height: min(760px, calc(100vh - 32px)); overflow: auto; border: 1px solid #d9e5ef; border-radius: 18px; background: #fffdf8; box-shadow: 0 28px 80px rgba(25, 36, 29, .22); }
      .detail-close { position: sticky; top: 14px; float: right; z-index: 4; width: 42px; height: 42px; margin: 14px 14px 0 0; border: 1px solid #d9e5df; border-radius: 999px; background: rgba(255,255,255,.92); color: #35443a; font-size: 22px; font-weight: 850; cursor: pointer; }
      .detail-close:hover { background: #f2f7f2; }
      .detail-body { display: grid; grid-template-columns: minmax(280px, 360px) minmax(0, 1fr); gap: 22px; padding: 24px; }
      .detail-hero { overflow: hidden; border: 1px solid #e3edf4; border-radius: 14px; background: #fff; }
      .detail-visual { position: relative; height: 360px; background: linear-gradient(#fff, #fff 78%, #f7fafb); }
      .detail-visual .gallery-type { top: 16px; font-size: 18px; }
      .detail-visual .gallery-cn { top: 52px; font-size: 38px; }
      .detail-visual .gallery-code { top: 96px; font-size: 34px; }
      .detail-visual .gallery-avatar { top: 148px; width: 94%; height: 198px; }
      .detail-meta { padding: 14px 16px 16px; border-top: 1px solid #eef2f7; background: #fbfdff; }
      .detail-meta h2 { margin: 0 0 7px; color: #111827; font-size: 20px; line-height: 1.2; font-weight: 950; }
      .detail-meta p { margin: 0; color: #64748b; font-size: 14px; line-height: 1.45; font-weight: 750; }
      .detail-content { padding: 4px 4px 0; }
      .detail-kicker { margin: 0 0 8px; color: #2f8f42; font-size: 14px; line-height: 1.3; font-weight: 950; }
      .detail-title { margin: 0 0 12px; color: #1f2d24; font-size: 28px; line-height: 1.12; font-weight: 950; letter-spacing: 0; }
      .detail-essay { margin: 0 0 18px; color: #334155; font-size: 15px; line-height: 1.85; font-weight: 650; }
      .detail-section-title { margin: 20px 0 12px; color: #27372e; font-size: 17px; line-height: 1.3; font-weight: 950; }
      .detail-facts { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin: 0 0 18px; }
      .detail-fact { min-height: 74px; padding: 12px; border: 1px solid #e1eadf; border-radius: 12px; background: #fbfdf9; }
      .detail-fact strong { display: block; margin-bottom: 5px; color: #62766e; font-size: 12px; font-weight: 950; }
      .detail-fact span { color: #1f2937; font-size: 14px; line-height: 1.45; font-weight: 750; }
      .detail-radar { display: grid; grid-template-columns: 260px minmax(0, 1fr); gap: 18px; align-items: center; padding: 16px; border: 1px solid #e1eadf; border-radius: 14px; background: #fbfdf9; }
      .detail-radar svg { width: 100%; max-width: 260px; aspect-ratio: 1; }
      .radar-grid { fill: none; stroke: #d9e5df; stroke-width: 1; }
      .radar-axis { stroke: #e2e8f0; stroke-width: 1; }
      .radar-area { fill: rgba(47, 143, 66, .22); stroke: #2f8f42; stroke-width: 3; }
      .radar-dot { fill: #2f8f42; stroke: #fff; stroke-width: 2; }
      .radar-label { fill: #506458; font-size: 13px; font-weight: 850; }
      .radar-list { display: grid; gap: 10px; }
      .radar-row { display: grid; grid-template-columns: 72px 1fr 34px; gap: 10px; align-items: center; }
      .radar-row-name { color: #243029; font-size: 13px; font-weight: 900; }
      .radar-track { height: 8px; overflow: hidden; border-radius: 999px; background: #e8efe9; }
      .radar-fill { height: 100%; border-radius: inherit; background: linear-gradient(90deg, #70b981, #2f8f42); }
      .radar-score { color: #60738c; font-size: 12px; font-weight: 950; text-align: right; }

      const radarDimensions = [

        ["社交开关", ["social", "chaos"]],

      ];

      function roleRadarItems(r) {
        const raw = radarDimensions.map(([, keys]) => keys.reduce((sum, key) => sum + (r.map[key] ?? 0), 0));
        const min = Math.min(...raw);
        const max = Math.max(...raw);
        return radarDimensions.map(([name], index) => {
          const value = max === min ? 72 : Math.round(44 + ((raw[index] - min) / (max - min)) * 48);
          return { name, value: Math.max(38, Math.min(96, value)) };
        });
      }

      function radarAxisPoint(index, total, radius = 112, cx = 150, cy = 150) {
        const angle = -Math.PI / 2 + index * 2 * Math.PI / total;
        return { x: cx + Math.cos(angle) * radius, y: cy + Math.sin(angle) * radius, angle };
      }

      function radarPolygonPoints(items, radius = 104, cx = 150, cy = 150) {
        return items.map((item, index) => {
          const angle = -Math.PI / 2 + index * 2 * Math.PI / items.length;
          const distance = radius * (item.value / 100);
          return `${(cx + Math.cos(angle) * distance).toFixed(1)},${(cy + Math.sin(angle) * distance).toFixed(1)}`;
        }).join(" ");
      }

      function detailRadarHtml(r) {
        const items = roleRadarItems(r);
        const grid = [0.25, 0.5, 0.75, 1].map(level => {
          const points = items.map((_, index) => {
            const point = radarAxisPoint(index, items.length, 104 * level);
            return `${point.x.toFixed(1)},${point.y.toFixed(1)}`;
          }).join(" ");
          return `<polygon class="radar-grid" points="${points}"></polygon>`;
        }).join("");
        const axes = items.map((item, index) => {
          const end = radarAxisPoint(index, items.length, 112);
          const label = radarAxisPoint(index, items.length, 122);
          const anchor = Math.abs(Math.cos(label.angle)) < 0.25 ? "middle" : (Math.cos(label.angle) > 0 ? "start" : "end");
          const dy = Math.sin(label.angle) > 0.4 ? 14 : (Math.sin(label.angle) < -0.4 ? -4 : 4);
          return `
            <line class="radar-axis" x1="150" y1="150" x2="${end.x.toFixed(1)}" y2="${end.y.toFixed(1)}"></line>
            <text class="radar-label" x="${label.x.toFixed(1)}" y="${(label.y + dy).toFixed(1)}" text-anchor="${anchor}">${item.name}</text>
          `;
        }).join("");
        const dots = items.map((item, index) => {
          const point = radarAxisPoint(index, items.length, 104 * (item.value / 100));
          return `<circle class="radar-dot" cx="${point.x.toFixed(1)}" cy="${point.y.toFixed(1)}" r="4"></circle>`;
        }).join("");
        const rows = items.map(item => `
          <div class="radar-row">
            <div class="radar-row-name">${item.name}</div>
            <div class="radar-track"><div class="radar-fill" style="width:${item.value}%"></div></div>
            <div class="radar-score">${item.value}</div>
          </div>
        `).join("");
        return `
          <svg viewBox="0 0 300 300" role="img" aria-label="${r.type}${r.name}雷达图">
            ${grid}
            ${axes}
            <polygon class="radar-area" points="${radarPolygonPoints(items)}"></polygon>
            ${dots}
          </svg>
          <div class="radar-list">${rows}</div>
        `;
      }

        if (!r) return;
        document.getElementById("detailBody").innerHTML = detailHtml(r);
        document.getElementById("detailOverlay").classList.add("open");
        document.getElementById("detailOverlay").setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }

      function closeDetail() {
        document.getElementById("detailOverlay").classList.remove("open");
        document.getElementById("detailOverlay").setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      }

      document.getElementById('gallery').innerHTML = results.map(galleryCardHtml).join('');
      document.getElementById('gallery').addEventListener('click', event => {
        const card = event.target.closest('.gallery-card');
        if (card) openDetail(card.dataset.code);
      });
      document.getElementById('gallery').addEventListener('keydown', event => {
        if (event.key !== 'Enter' && event.key !== ' ') return;
        const card = event.target.closest('.gallery-card');
        if (!card) return;
        event.preventDefault();
        openDetail(card.dataset.code);
      });
      document.getElementById('detailClose').addEventListener('click', closeDetail);
      document.getElementById('detailOverlay').addEventListener('click', event => {
        if (event.target.id === 'detailOverlay') closeDetail();
      });
      document.addEventListener('keydown', event => {
        if (event.key === 'Escape') closeDetail();
      });
    </script>
  </body>
</html>
